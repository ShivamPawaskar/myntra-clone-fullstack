version: "3.9"

# Full production-shaped local stack: Postgres + Redis + API + RQ worker +
# scheduler. This is the closest you can get to the deployed topology on
# one machine. (For zero-setup dev you can skip all this and just run
# uvicorn against SQLite -- see README.)

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: myntra
      POSTGRES_PASSWORD: myntra
      POSTGRES_DB: myntra
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myntra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://myntra:myntra@db:5432/myntra
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-real-deploy
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: rq worker notifications --url redis://redis:6379/0
    environment:
      DATABASE_URL: postgresql+asyncpg://myntra:myntra@db:5432/myntra
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
      - redis

volumes:
  pgdata:
