name: Backend tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

defaults:
  run:
    working-directory: backend

jobs:
  # Fast default leg: the suite on its in-memory SQLite fixture across the
  # supported Python versions.
  sqlite:
    name: pytest (sqlite, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest app/tests -q

  # Prod-parity leg: the SAME suite against a real PostgreSQL, which is what
  # catches dev/prod SQL divergences (tz-aware datetimes, SELECT DISTINCT +
  # ORDER BY, dialect-specific behaviour) that SQLite silently tolerates.
  postgres:
    name: pytest (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run tests against PostgreSQL
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: pytest app/tests -q
