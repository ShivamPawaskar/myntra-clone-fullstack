# Render Blueprint — one-click deploy of the backend stack, on FREE plans.
# Commit this file and use "New > Blueprint" in the Render dashboard, point
# it at the repo, and Render provisions everything below at $0.
#
# Topology: web API (Docker) + managed PostgreSQL + managed Redis (Key Value).
#
# The background RQ worker (push-notification delivery) is intentionally NOT
# included because Render has no free tier for background workers. Everything
# else — products, search, filters, cart, checkout, orders, reviews,
# recommendations — works without it. To enable notification delivery later,
# add a `type: worker` service running:  rq worker notifications --url $REDIS_URL
#
# Free-tier caveats to know:
#   - the web service sleeps after ~15 min idle (first request then ~50s cold start)
#   - Render's free PostgreSQL is removed after ~30 days; for a longer-lived
#     demo, point DATABASE_URL at a free Neon database instead.

services:
  - type: web
    name: myntra-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: myntra-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: myntra-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true
      - key: ENV
        value: production
    # The Dockerfile CMD runs `alembic upgrade head` before starting uvicorn,
    # so migrations apply automatically on every deploy.

  # Managed Redis (Key Value) — used for the per-user rate limiter and the
  # (currently unprocessed) notification queue.
  - type: keyvalue
    name: myntra-redis
    plan: free
    ipAllowList: []   # empty = internal-only (services connect via the private URL)

databases:
  - name: myntra-db
    plan: free
    postgresMajorVersion: "16"
